name: AADS Health Monitor (L4-External)
# AADS-131: L4 외부 모니터링 — GitHub Actions scheduled workflow
# 5분 주기로 health-check API 호출, 실패 시 텔레그램 알림

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:  # 수동 트리거 허용

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Health Check
        run: |
          HC=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://aads.newtalk.kr/api/v1/ops/health-check")
          echo "HTTP Status: $HC"
          if [ "$HC" != "200" ]; then
            echo "ALERT: health-check failed with HTTP $HC"
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TG_CHAT_ID }}" \
              -d text="🚨 [L4-EXTERNAL] AADS health-check FAILED (HTTP $HC) — $(date -u '+%Y-%m-%d %H:%M UTC')"
            exit 1
          fi
          echo "OK: AADS health-check passed (HTTP $HC)"

      - name: Check Stalled Tasks
        run: |
          RESPONSE=$(curl -s --max-time 15 "https://aads.newtalk.kr/api/v1/ops/health-check")
          HEALTHY=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('pipeline_healthy', False))" 2>/dev/null)
          STALLED=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('stalled_count', 0))" 2>/dev/null)
          echo "pipeline_healthy: $HEALTHY, stalled_count: $STALLED"
          if [ "$HEALTHY" = "False" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TG_CHAT_ID }}" \
              -d text="⚠️ [L4-EXTERNAL] pipeline_healthy=False, stalled_count=${STALLED} — $(date -u '+%Y-%m-%d %H:%M UTC')"
          fi
